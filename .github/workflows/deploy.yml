name: Deploy to Amazon ECS

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: simple-api-repo
  ECS_SERVICE: api-service
  ECS_CLUSTER: api-cluster
  # Removi o .aws/ da frente para evitar erro de diretório se a pasta não existir
  ECS_TASK_DEFINITION: task-definition.json 
  CONTAINER_NAME: api-container

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # --- INÍCIO DO BLOCO DE DEBUG ---
    - name: Debug Secrets Presence
      run: |
        echo "Verificando se os segredos estão vindo do GitHub..."
        if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
          echo "ERRO: AWS_ACCESS_KEY_ID está VAZIO"
        else
          echo "AWS_ACCESS_KEY_ID detectado (mascarado pelo GitHub)"
        fi
        
        if [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
          echo "ERRO: AWS_SECRET_ACCESS_KEY está VAZIO"
        else
          echo "AWS_SECRET_ACCESS_KEY detectado (mascarado pelo GitHub)"
        fi
    # --- FIM DO BLOCO DE DEBUG ---

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Download task definition
      run: |
        # Adicionado debug para ver se o comando de download funciona
        aws ecs describe-task-definition --task-definition api-task --query taskDefinition > task-definition.json
        cat task-definition.json | grep family

    - name: Fill in the new image ID in the Amazon ECS task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-definition.json
        container-name: ${{ env.CONTAINER_NAME }}
        image: ${{ steps.build-image.outputs.image }}

    - name: Deploy Amazon ECS task definition
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true